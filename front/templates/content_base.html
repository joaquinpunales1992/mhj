{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}My Akiya in Japan{% endblock %}</title>
  <meta name="description" content="{% block description %}Affordable homes and akiya for sale in Japan.{% endblock %}">
  <link rel="canonical" href="{% block canonical %}https://akiyainjapan.com/{% endblock %}">
  <link rel="icon" type="image/svg+xml" href="{% static 'favicon.svg' %}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500&family=Work+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#477535; --primary-dark:#3a5f2b; --bg:#faf8f4; --fg:#2b2b2b; --muted:#6f6f70; --border:rgba(71,117,53,.14); }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Work Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--fg); line-height:1.65; -webkit-font-smoothing:antialiased; }
    a { color:var(--primary); }
    .topbar { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem; max-width:1000px; margin:0 auto; padding:1.1rem 1.5rem; }
    .brand { font-family:'Noto Serif JP',serif; font-size:1.25rem; color:var(--primary); text-decoration:none; font-weight:500; }
    .topnav a { margin-left:1.1rem; text-decoration:none; color:var(--fg); font-size:.95rem; }
    .topnav a:hover { color:var(--primary); }
    .wrap { max-width:820px; margin:0 auto; padding:1rem 1.5rem 4rem; }
    .wrap h1 { font-family:'Noto Serif JP',serif; font-weight:500; font-size:2.1rem; margin:1.25rem 0 1rem; line-height:1.2; }
    .wrap h2 { font-family:'Noto Serif JP',serif; font-weight:500; font-size:1.4rem; margin:2rem 0 .75rem; }
    .wrap p, .wrap li { margin-bottom:.75rem; }
    .wrap ol, .wrap ul { padding-left:1.4rem; margin-bottom:1rem; }
    .lead { font-size:1.15rem; color:var(--muted); margin-bottom:1.25rem; }
    .faq { border-bottom:1px solid var(--border); padding:.9rem 0; }
    .faq:last-child { border-bottom:0; }
    .faq strong { color:var(--primary); display:block; margin-bottom:.2rem; }
    .cta { display:inline-block; background:var(--primary); color:#fff; border-radius:10px; padding:.8rem 1.4rem; text-decoration:none; font-weight:600; margin-top:1rem; }
    .cta:hover { background:var(--primary-dark); }
    footer.site { border-top:1px solid var(--border); text-align:center; padding:2rem 1.5rem; color:var(--muted); font-size:.9rem; }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">My Akiya in Japan</a>
    <nav class="topnav" aria-label="Primary">
      <a href="/">Browse homes</a>
      <a href="{% url 'how_to_buy' %}">How to buy</a>
      <a href="{% url 'faqs' %}">FAQs</a>
      <a href="{% url 'about' %}">About</a>
      <a href="{% url 'upgrade_premium' %}">Pricing</a>
    </nav>
  </header>
  <main class="wrap">
    {% block content %}{% endblock %}
  </main>
  <footer class="site">&copy; My Akiya in Japan &middot; <a href="mailto:hello@akiyainjapan.com">hello@akiyainjapan.com</a></footer>
</body>
</html>
